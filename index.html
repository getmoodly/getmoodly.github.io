<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Moodly</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6C5CE7">
    <style>
        :root{--p:#6C5CE7;--pl:#A29BFE;--pd:#5A4BD1;--a:#00CEC9;--al:#81ECEC;--bg:#0F0E17;--c1:#1A1928;--c2:#232240;--t:#FFFFFE;--t2:#A7A9BE;--ok:#00B894;--w:#FDCB6E;--bad:#E17055;--g:#FFD700;--r:16px;--rs:10px}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden}
        button,label,input{font-family:inherit}

        /* NAV */
        .nav{position:fixed;bottom:0;left:0;right:0;background:var(--c1);border-top:1px solid rgba(255,255,255,.05);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
        .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;color:var(--t2);font-size:.62rem;font-weight:600;cursor:pointer;gap:2px;transition:color .2s}
        .ni.on{color:var(--pl)}
        .ni svg{width:22px;height:22px;fill:currentColor}

        /* PAGES */
        .pg{display:none;padding:16px 16px 88px;max-width:500px;margin:0 auto}
        .pg.on{display:block;animation:fu .25s ease}
        @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* COMMON */
        .cd{background:var(--c1);border-radius:var(--r);padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
        .ct{font-size:.92rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
        .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:none;border-radius:var(--rs);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s}
        .bp{background:linear-gradient(135deg,var(--p),var(--pd));color:var(--t)}
        .ba{background:linear-gradient(135deg,var(--a),var(--ok));color:var(--bg)}
        .bs{background:rgba(255,255,255,.07);color:var(--t)}
        .bg{background:linear-gradient(135deg,var(--g),#FFA500);color:#000}
        .btn:active{transform:scale(.97)}
        .btn:disabled{opacity:.35;pointer-events:none}
        .tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600;background:rgba(108,92,231,.18);color:var(--pl)}
        .sr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
        .sb{background:rgba(255,255,255,.03);border-radius:var(--rs);padding:13px;text-align:center}
        .sb .v{font-size:1.5rem;font-weight:800}
        .sb .l{font-size:.68rem;color:var(--t2);margin-top:2px}
        .sb .c{font-size:.68rem;font-weight:600;margin-top:2px}
        .sb .c.up{color:var(--ok)}.sb .c.dn{color:var(--bad)}

        /* ONBOARDING */
        .ob{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center}
        .ob.h{display:none}
        .ob-step{display:none;flex-direction:column;align-items:center;width:100%;max-width:320px;animation:fu .3s ease}
        .ob-step.on{display:flex}
        .ob h1{font-size:1.7rem;font-weight:800;margin-bottom:6px}
        .ob p{color:var(--t2);line-height:1.5;font-size:.88rem;margin-bottom:20px}
        .ob input[type=text]{width:100%;padding:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);color:var(--t);font-size:1.1rem;text-align:center;outline:none;margin-bottom:16px}
        .ob input::placeholder{color:var(--t2)}
        .personality-grid{display:flex;flex-direction:column;gap:8px;width:100%;margin-bottom:20px}
        .pers-btn{padding:14px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:var(--rs);color:var(--t);text-align:left;cursor:pointer;transition:all .2s}
        .pers-btn.sel{border-color:var(--p);background:rgba(108,92,231,.15)}
        .pers-btn strong{display:block;font-size:.9rem;margin-bottom:2px}
        .pers-btn span{font-size:.75rem;color:var(--t2)}

        /* AVATAR */
        .avatar-wrap{position:relative;width:140px;height:140px;margin:0 auto}
        .avatar-orb{width:140px;height:140px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;transition:all .5s}
        .avatar-orb .glow{position:absolute;inset:-20px;border-radius:50%;filter:blur(25px);opacity:.4;transition:all .5s}
        .avatar-orb .core{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;transition:all .5s}
        .avatar-orb .eyes{display:flex;gap:18px;margin-bottom:6px}
        .avatar-orb .eye{width:8px;height:8px;border-radius:50%;background:#fff;transition:all .3s}
        .avatar-orb .mouth{width:20px;height:3px;border-radius:3px;background:rgba(255,255,255,.6);transition:all .3s}
        /* States */
        .avatar-orb.idle .core{animation:breathe 4s ease-in-out infinite}
        .avatar-orb.listening .core{animation:listen-pulse 1.5s ease-in-out infinite}
        .avatar-orb.speaking .core{animation:speak-pulse .6s ease-in-out infinite}
        .avatar-orb.happy .mouth{width:24px;height:10px;border-bottom-left-radius:12px;border-bottom-right-radius:12px;border-top-left-radius:0;border-top-right-radius:0}
        .avatar-orb.concerned .eye{height:6px}
        .avatar-orb.thinking .eye:nth-child(1){transform:translateY(-2px)}

        @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes listen-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.9}}
        @keyframes speak-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

        /* CONVERSATION VIEW */
        .conv-view{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column}
        .conv-view.on{display:flex}
        .conv-top{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
        .conv-top .name{font-weight:700;font-size:.92rem;display:flex;align-items:center;gap:8px}
        .conv-top .name .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:blink 1.5s infinite}
        .conv-top .timer{font-size:.78rem;color:var(--t2);font-variant-numeric:tabular-nums}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        .conv-camera{position:absolute;top:56px;right:12px;width:72px;height:54px;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.12);z-index:2}
        .conv-camera video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
        .chat-area{flex:1;overflow-y:auto;padding:16px;padding-top:60px;display:flex;flex-direction:column;gap:10px;position:relative}
        .chat-msg{max-width:82%;padding:12px 16px;border-radius:18px;font-size:.88rem;line-height:1.5;animation:fu .3s ease}
        .chat-msg.ai{align-self:flex-start;background:var(--c2);color:var(--t);border-bottom-left-radius:4px}
        .chat-msg.user{align-self:flex-end;background:var(--p);color:#fff;border-bottom-right-radius:4px}
        .chat-msg.typing{color:var(--t2);font-style:italic}
        .typing-dots{display:inline-flex;gap:3px;padding:4px 0}
        .typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--t2);animation:tdot 1.2s infinite}
        .typing-dots span:nth-child(2){animation-delay:.2s}
        .typing-dots span:nth-child(3){animation-delay:.4s}
        @keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
        .conv-bottom{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);padding-bottom:calc(12px + env(safe-area-inset-bottom))}
        .conv-input-row{display:flex;gap:8px;align-items:center}
        .conv-text-input{flex:1;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;color:var(--t);font-size:.88rem;outline:none}
        .conv-text-input::placeholder{color:var(--t2)}
        .mic-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
        .mic-btn.idle{background:var(--p)}
        .mic-btn.rec{background:var(--bad);animation:rec-pulse 1.5s infinite}
        .mic-btn svg{width:20px;height:20px;fill:#fff}
        @keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(225,112,85,.3)}50%{box-shadow:0 0 0 10px rgba(225,112,85,0)}}
        .send-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--a);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
        .send-btn svg{width:20px;height:20px;fill:var(--bg)}
        .conv-actions{display:flex;gap:8px;margin-top:8px;justify-content:center}
        .end-btn{padding:8px 24px;border:none;border-radius:20px;background:rgba(225,112,85,.15);color:var(--bad);font-size:.8rem;font-weight:600;cursor:pointer}
        .end-btn:active{transform:scale(.95)}
        .listening-indicator{font-size:.72rem;color:var(--t2);text-align:center;margin-bottom:6px;min-height:16px}

        /* HOME */
        .home-top{text-align:center;padding:20px 0 8px}
        .home-top h1{font-size:1.3rem;font-weight:800}
        .home-top .sub{font-size:.8rem;color:var(--t2);margin-top:2px}
        .value-proof{background:linear-gradient(135deg,rgba(0,184,148,.12),rgba(108,92,231,.12));border:1px solid rgba(0,184,148,.2);border-radius:var(--r);padding:16px;margin:14px 0;text-align:center}
        .value-proof .big{font-size:1.6rem;font-weight:800;color:var(--ok)}
        .value-proof .desc{font-size:.82rem;color:var(--t2);margin-top:4px;line-height:1.4}
        .streak-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0}
        .streak-row .fire{font-size:1.3rem}
        .streak-row .num{font-size:1.4rem;font-weight:800;color:var(--g)}
        .streak-row .lbl{font-size:.78rem;color:var(--t2)}
        .week-dots{display:flex;gap:4px;justify-content:center;margin:4px 0 14px}
        .wd{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700}
        .wd.done{background:var(--ok);color:#fff}
        .wd.now{background:var(--p);color:#fff;border:2px solid var(--pl)}
        .wd.fut{background:rgba(255,255,255,.05);color:var(--t2)}

        .start-conv-btn{width:100%;padding:18px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin:16px 0}
        .start-conv-btn:active{transform:scale(.97)}
        .start-conv-btn .orb-mini{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,var(--pl),var(--p));display:flex;align-items:center;justify-content:center}
        .start-conv-btn .orb-mini .dot{width:5px;height:5px;border-radius:50%;background:#fff;margin:0 2px}

        /* ALERTS */
        .alert-card{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--r);margin-bottom:10px;animation:fu .3s ease}
        .alert-card.warn{background:rgba(253,203,110,.08);border:1px solid rgba(253,203,110,.18)}
        .alert-card.bad{background:rgba(225,112,85,.08);border:1px solid rgba(225,112,85,.18)}
        .alert-card.good{background:rgba(0,184,148,.08);border:1px solid rgba(0,184,148,.18)}
        .alert-card.insight{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.18)}
        .alert-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
        .alert-body{flex:1;min-width:0}
        .alert-title{font-size:.84rem;font-weight:700}
        .alert-desc{font-size:.76rem;color:var(--t2);margin-top:2px;line-height:1.4}
        .alert-dismiss{background:none;border:none;color:var(--t2);font-size:1.1rem;cursor:pointer;padding:2px 6px;flex-shrink:0;opacity:.6}

        /* QUICK THOUGHT */
        .qt-card{background:var(--c1);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
        .qt-row{display:flex;gap:8px;align-items:center}
        .qt-input{flex:1;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;color:var(--t);font-size:.86rem;outline:none}
        .qt-input::placeholder{color:var(--t2)}
        .qt-send{width:38px;height:38px;border-radius:50%;border:none;background:var(--a);color:var(--bg);font-size:1.1rem;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
        .qt-send:active{transform:scale(.93)}
        .qt-send svg{width:18px;height:18px;fill:var(--bg)}
        .qt-feedback{margin-top:12px;padding:12px;border-radius:var(--rs);background:rgba(255,255,255,.04);animation:fu .3s ease}
        .qt-emo{font-size:.84rem;font-weight:600;display:flex;align-items:center;gap:6px}
        .qt-comment{font-size:.76rem;color:var(--t2);margin-top:4px;line-height:1.4}
        .qt-bar{height:4px;border-radius:2px;margin-top:8px;background:rgba(255,255,255,.07);overflow:hidden}
        .qt-fill{height:100%;border-radius:2px;transition:width .6s ease}

        /* RESULT */
        .res-hero{text-align:center;padding:16px 0}
        .score-ring{width:130px;height:130px;border-radius:50%;margin:0 auto 14px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .score-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
        .score-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
        .score-ring .bg{stroke:rgba(255,255,255,.06)}
        .score-ring .fg{transition:stroke-dashoffset 1.2s ease}
        .score-ring .sv{font-size:2.5rem;font-weight:800;z-index:1}
        .score-ring .sl{font-size:.72rem;color:var(--t2);z-index:1}
        .ai-ref{background:linear-gradient(135deg,rgba(0,206,201,.1),rgba(108,92,231,.1));border:1px solid rgba(0,206,201,.18);border-radius:var(--r);padding:15px;margin:14px 0}
        .ai-ref h3{font-size:.88rem;color:var(--al);margin-bottom:5px}
        .ai-ref p{font-size:.82rem;color:var(--t2);line-height:1.55}
        .ts-box{background:rgba(255,255,255,.03);border-radius:var(--rs);padding:12px;margin:10px 0;max-height:140px;overflow-y:auto}
        .ts-box p{font-size:.82rem;line-height:1.55;color:var(--t2);font-style:italic}
        .cats{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0}
        .share-cd{background:linear-gradient(135deg,var(--pd),#2D1B69);border-radius:var(--r);padding:20px;text-align:center;margin:12px 0}
        .share-cd h3{font-size:.95rem;margin-bottom:10px}
        .share-row{display:flex;justify-content:center;gap:20px;margin-bottom:12px}
        .share-i .n{font-size:1.3rem;font-weight:800}
        .share-i .l{font-size:.62rem;color:var(--t2)}

        /* DIARY */
        .de{background:var(--c1);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.04);cursor:pointer}
        .de:active{background:var(--c2)}
        .de-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .de-d{font-size:.72rem;color:var(--t2)}
        .de-s{font-size:1.05rem;font-weight:800}
        .de-x{font-size:.8rem;color:var(--t2);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .de-t{display:flex;gap:4px;margin-top:6px}
        .d-search{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:var(--rs);color:var(--t);font-size:.88rem;outline:none;margin-bottom:12px}
        .d-search::placeholder{color:var(--t2)}

        /* PROGRESS */
        .lvl-bar{display:flex;align-items:center;gap:11px;margin-bottom:14px}
        .lvl-b{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;flex-shrink:0}
        .lvl-i{flex:1}
        .lvl-i .n{font-size:.88rem;font-weight:700}
        .lvl-i .x{font-size:.72rem;color:var(--t2);margin-top:2px}
        .xp-bar{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:4px;overflow:hidden}
        .xp-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p),var(--a));transition:width .5s}
        .rank-cd{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.04));border:1px solid rgba(255,215,0,.18);border-radius:var(--r);padding:15px;text-align:center;margin-bottom:12px}
        .rank-p{font-size:2rem;font-weight:800;color:var(--g)}
        .rank-l{font-size:.82rem;color:var(--t2);margin-top:3px}
        .rank-bw{margin:10px 0;height:7px;background:rgba(255,255,255,.07);border-radius:4px;position:relative}
        .rank-bf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--bad),var(--w),var(--ok))}
        .rank-m{position:absolute;top:-4px;width:14px;height:14px;background:var(--g);border:2px solid #fff;border-radius:50%;transform:translateX(-50%)}
        .ch-w{width:100%;height:150px;position:relative}
        .ch-w canvas{width:100%;height:100%}
        .toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--c1);border:1px solid rgba(255,255,255,.1);color:var(--t);padding:10px 20px;border-radius:var(--rs);font-size:.8rem;z-index:150;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--pd);border-radius:3px}

        /* SETTINGS */
        .sett-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem}
        .sett-row:last-child{border-bottom:none}
        .sett-input{width:130px;padding:8px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--t);font-size:.84rem;outline:none;text-align:right}
        .sett-input::placeholder{color:var(--t2)}
        .lang-btns{display:flex;gap:8px}
        .lang-btns .btn{flex:1;padding:10px}

        /* FAMILY */
        .fam-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding:16px 16px 32px;max-width:500px;margin:0 auto}
        .fam-member{display:flex;align-items:center;gap:12px;padding:14px;background:var(--c1);border-radius:var(--r);margin-bottom:10px;border:1px solid rgba(255,255,255,.04)}
        .fam-avatar{font-size:1.5rem;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(108,92,231,.12);border-radius:50%;flex-shrink:0}
        .fam-info{flex:1;min-width:0}
        .fam-name{font-weight:700;font-size:.88rem}
        .fam-stat{font-size:.72rem;color:var(--t2);margin-top:2px}
        .fam-score{text-align:right}
        .fam-score .v{font-size:1.2rem;font-weight:800}
        .fam-score .trend{font-size:.7rem;font-weight:600}
        .profile-banner{position:fixed;top:0;left:0;right:0;background:var(--p);color:#fff;text-align:center;padding:8px 16px;font-size:.78rem;font-weight:600;z-index:99;display:flex;align-items:center;justify-content:center;gap:8px}
        .profile-banner .back-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 12px;border-radius:12px;font-size:.72rem;cursor:pointer}
        select{padding:8px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);color:var(--t);font-size:.84rem;outline:none}
    </style>
</head>
<body>

<!-- PROFILE BANNER (for child profile viewing) -->
<div class="profile-banner" id="profile-banner" style="display:none">
    <span id="profile-banner-text"></span>
    <button class="back-btn" onclick="switchToParent()">Tillbaka</button>
</div>

<!-- FAMILY DASHBOARD OVERLAY -->
<div class="fam-overlay" id="fam-overlay" style="display:none">
    <div id="fam-overlay-content"></div>
</div>

<!-- ONBOARDING -->
<div class="ob" id="ob">
    <div class="ob-step on" id="ob1">
        <div style="font-size:3.2rem;margin-bottom:14px">🧠</div>
        <h1 id="ob-title">Moodly</h1>
        <p id="ob-tagline"></p>
        <div style="text-align:left;max-width:260px;margin-bottom:24px" id="ob-feats"></div>

let AL='sv'; // Active Language
function t(key,vars){
  let v=LANG[AL][key];
  if(v===undefined)v=LANG.sv[key];
  if(v===undefined)return key;
  if(typeof v==='string'&&vars){for(const[k,val] of Object.entries(vars))v=v.replace(new RegExp('\\{'+k+'\\}','g'),val)}
  return v;
}

// ===== STORAGE =====
const PARENT_KEY='moodly';
let APK=PARENT_KEY; // ACTIVE_PROFILE_KEY
let D={checkins:[],micro:[],xp:0,level:1,firstVisit:true,baseline:null,userName:'',aiName:'Luna',personality:'warm',onboarded:null,alertsSeen:[],lang:'sv',familyId:'',role:'self',familyProfiles:[],parentKey:''};
let sok=false;try{localStorage.setItem('_','1');localStorage.removeItem('_');sok=true}catch(e){}

// Migration: copy kf3 data to moodly if kf3 exists and moodly does not
(function migrate(){
  if(!sok)return;
  try{
    const old=localStorage.getItem('kf3');
    const nw=localStorage.getItem('moodly');
    if(old&&!nw){localStorage.setItem('moodly',old)}
  }catch(e){}
})();

function ld(){
  if(!sok)return{...D};
  try{
    const r=localStorage.getItem(APK);
    if(!r)return{...D};
    const d=JSON.parse(r);
    if(!d.micro)d.micro=[];
    if(!d.alertsSeen)d.alertsSeen=[];
    if(!d.lang)d.lang='sv';
    if(!d.role)d.role='self';
    if(!d.familyProfiles)d.familyProfiles=[];
    if(!d.familyId)d.familyId='';
    if(!d.parentKey)d.parentKey='';
    return d;
  }catch(e){return{...D}}
}
function getAllDataPoints(d){const f=(d.checkins||[]).map(c=>({...c,type:'full'}));const m=(d.micro||[]).map(c=>({...c,type:'micro'}));return[...f,...m].sort((a,b)=>new Date(a.ts)-new Date(b.ts))}
function sv(d){D=d;if(sok)try{localStorage.setItem(APK,JSON.stringify(d))}catch(e){}}

// ===== SENTIMENT =====
function analyze(txt){
    if(!txt||!txt.trim())return{emotion:'neutral',score:50,conf:0,cats:['allmaent']};
    const l=txt.toLowerCase();
    const emo=LANG[AL].EMO, cats=LANG[AL].CATS;
    let sc={},tot=0;
    for(const[e,d]of Object.entries(emo)){let h=0;for(const w of d.w)if(l.includes(w))h++;sc[e]=h;tot+=h}
    let dom='neutral',mx=0;for(const[e,h]of Object.entries(sc))if(h>mx){mx=h;dom=e}
    // Map to canonical (Swedish) key
    const canonical=emo[dom]?.map||dom;
    const v=tot>0?(emo[dom]?.v??.5):.5;
    const foundCats=[];
    for(const[c,ws]of Object.entries(cats)){
      if(ws.some(w=>l.includes(w))){
        // Map EN category key to SV canonical
        const mapped=LANG.en.catMap?.[c]||c;
        foundCats.push(AL==='en'?mapped:c);
      }
    }
    if(!foundCats.length)foundCats.push('allmaent');
    return{emotion:canonical,score:Math.round(v*100),conf:Math.min(tot/3,1),cats:foundCats};
}

// ===== LEVELS =====
function getLvl(xp){const lvls=t('LVLS');let r=lvls[0];for(const l of lvls)if(xp>=l.xp)r=l;return r}
function getNext(xp){const lvls=t('LVLS');for(const l of lvls)if(xp<l.xp)return l;return null}
function calcStreak(ci){if(!ci.length)return 0;const ds=new Set(ci.map(c=>new Date(c.ts).toDateString()));let s=0,d=new Date();while(ds.has(d.toDateString())){s++;d.setDate(d.getDate()-1)}return s}
function todayDone(ci){return ci.some(c=>new Date(c.ts).toDateString()===new Date().toDateString())}

// ===== CONVERSATION ENGINE =====
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function tpl(s){const d=ld();return s.replace(/\{name\}/g,d.userName||'du')}

function extractTopics(text){
    const topics=LANG[AL].TOPICS;
    const stopwords=LANG[AL].STOPWORDS;
    const words=text.toLowerCase().replace(/[.,!?;:]/g,' ').split(/\s+/).filter(w=>w.length>2&&!stopwords.has(w));
    const found=[];
    for(const w of words){
        for(const[cat,list]of Object.entries(topics)){
            if(list.some(t2=>w.includes(t2)||t2.includes(w))){
              // Map EN cat to SV canonical
              const mapped=AL==='en'?(LANG.en.catMap?.[cat]||cat):cat;
              found.push({word:w,cat:mapped});
            }
        }
    }
    const subjects=words.filter(w=>w.length>3&&!found.some(f=>f.word===w)).slice(0,3);
    return{found,subjects,raw:words};
}

function buildMirror(topics,sentiment){
    if(!topics.found.length&&!topics.subjects.length)return'';
    const kw=topics.found.length?topics.found[0].word:topics.subjects[0];
    if(AL==='en'){
      const adj=sentiment.score>=65?'positive':sentiment.score<=40?'tough':'';
      return adj?` ${kw} sounds ${adj}.`:` what you said about ${kw}.`;
    }
    const adj=sentiment.score>=65?'positivt':sentiment.score<=40?'tufft':'';
    return adj?` ${kw} later ${adj}.`:` det du sager om ${kw}.`;
}

function composeResponse(text,sentiment,topics){
    const d=ld(),pers=d.personality||'warm';
    const bucket=sentiment.score>=65?'pos':sentiment.score<=40?'neg':'neut';
    const mirrorSet=LANG[AL].MIRROR;
    let mirror=pick(mirrorSet[pers][bucket]);
    const suffix=buildMirror(topics,sentiment);
    if(suffix)mirror+=suffix.charAt(0)===' '?suffix:' '+suffix;

    // Choose follow-up category
    const followups=LANG[AL].FOLLOWUPS;
    const generalKey=AL==='en'?'general':'allmaent';
    const deepKey='deep';
    const cat=topics.found.length?topics.found[0].cat:(sentiment.cats?.[0]||'allmaent');
    // Map canonical SV cat to the FOLLOWUPS key for current language
    let fuCat=cat;
    if(AL==='en'){
      const revMap={jobb:'work',relationer:'relationships',halsa:'health',fritid:'leisure',allmaent:'general'};
      fuCat=revMap[cat]||cat;
    }
    const pool=convState.round>=4?[...(followups[fuCat]||[]),...(followups[deepKey]||[])]:((followups[fuCat]||followups[generalKey]));

    let available=pool.filter(q=>!convState.askedKeys.has(q.k));
    if(!available.length)available=(followups[generalKey]||[]).filter(q=>!convState.askedKeys.has(q.k));
    if(!available.length){convState.askedKeys.clear();available=pool;}

    const chosen=pick(available);
    convState.askedKeys.add(chosen.k);
    const topicWord=topics.found.length?topics.found[0].word:(topics.subjects[0]||(AL==='en'?'it':'det'));
    const question=chosen.q.replace(/\{t\}/g,topicWord);

    return mirror+' '+question;
}

function shouldEnd(){
    if(convState.round>=12)return true;
    if(convState.round>=4&&convState.shortCount>=2)return true;
    const last=convState.transcript.filter(t2=>t2.role==='user').slice(-1)[0]?.text?.toLowerCase()||'';
    if(AL==='en'){
      if(convState.round>=3&&/\b(thanks|goodbye|bye|see you|that's all|i have to|stop|done)\b/.test(last))return true;
    }else{
      if(convState.round>=3&&/\b(tack|hejda|vi ses|det var allt|jag maste|sluta)\b/.test(last))return true;
    }
    return false;
}

// ===== MAIN CONVERSATION FLOW =====
let convState={active:false,round:0,maxRounds:12,transcript:[],fullText:'',stream:null,recognition:null,timer:null,elapsed:0,emotions:[],listening:false,askedKeys:new Set(),lastTopics:null,shortCount:0};

async function startConversation(){
    const d=ld();
    convState={active:true,round:0,maxRounds:12,transcript:[],fullText:'',stream:null,recognition:null,timer:null,elapsed:0,emotions:[],listening:false,askedKeys:new Set(),lastTopics:null,shortCount:0};

    document.getElementById('conv-view').classList.add('on');
    document.getElementById('conv-name').innerHTML='<span class="dot"></span> '+(d.aiName||'Luna');
    document.getElementById('chat-area').innerHTML='';
    document.getElementById('conv-timer').textContent='0:00';
    document.getElementById('conv-text').value='';
    document.getElementById('listen-ind').textContent='';
    document.getElementById('mic-btn').className='mic-btn idle';

    try{
        convState.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
        document.getElementById('conv-vid').srcObject=convState.stream;
        document.getElementById('conv-camera').style.display='';
    }catch(e){
        try{convState.stream=await navigator.mediaDevices.getUserMedia({audio:true});document.getElementById('conv-camera').style.display='none'}catch(e2){document.getElementById('conv-camera').style.display='none'}
    }

    convState.timer=setInterval(()=>{
        convState.elapsed++;
        const m=Math.floor(convState.elapsed/60),s=convState.elapsed%60;
        document.getElementById('conv-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);

    if(!d.userName){
        convState.askingName=true;
        await aiMessage(t('askName'));
        return;
    }

    const pers=d.personality||'warm';
    const greets=LANG[AL].GREETS;
    let greeting=tpl(pick(greets[pers]||greets.warm));

    const todayMicros=(d.micro||[]).filter(m=>new Date(m.ts).toDateString()===new Date().toDateString());
    if(todayMicros.length>0){
        const last=todayMicros[todayMicros.length-1];
        greeting+=' '+t('microRef',{text:last.text.slice(0,35)+(last.text.length>35?'...':'')});
    }else if(d.checkins.length>0){
        const last=d.checkins[d.checkins.length-1];
        const daysSince=Math.floor((Date.now()-new Date(last.ts).getTime())/864e5);
        if(daysSince<=2&&last.emotion==='stressad')greeting+=' '+t('lastStressed');
        else if(daysSince<=2&&last.emotion==='ledsen')greeting+=' '+t('lastSad');
        else if(daysSince<=2&&last.cats?.includes('jobb'))greeting+=' '+t('lastJob');
        else if(daysSince<=2&&last.cats?.includes('relationer'))greeting+=' '+t('lastRel');
    }

    await aiMessage(greeting);
}

async function aiMessage(text){
    showTyping();
    await new Promise(r=>setTimeout(r,800+Math.random()*600));
    removeTyping();
    addChat('ai',text);
    trySpeak(text);
    document.getElementById('conv-text').focus();
}

function userSend(text){
    if(!text.trim()||!convState.active)return;
    addChat('user',text.trim());
    document.getElementById('conv-text').value='';
    stopListening();
    processUserResponse(text.trim());
}

async function processUserResponse(text){
    if(!convState.active)return;

    if(convState.askingName){
        const name=text.replace(/[^a-zA-ZåäöÅÄÖéÉ\s-]/g,'').trim().split(/\s+/)[0];
        if(name){
            const d=ld();d.userName=name;sv(d);
            convState.askingName=false;
            const pers=d.personality||'warm';
            const greets=LANG[AL].GREETS;
            let greeting=tpl(pick(greets[pers]||greets.warm));
            await aiMessage(greeting);
            return;
        }
    }

    convState.round++;
    const sentiment=analyze(text);
    const topics=extractTopics(text);
    convState.emotions.push(sentiment.emotion);
    convState.lastTopics=topics;

    if(text.trim().length<15)convState.shortCount++;
    else convState.shortCount=0;

    if(shouldEnd()){
        const d=ld(),pers=d.personality||'warm';
        const closes=LANG[AL].CLOSES;
        const close=tpl(pick(closes[pers]||closes.warm));
        await aiMessage(close);
        setTimeout(()=>endConversation(),2000);
        return;
    }

    const response=composeResponse(text,sentiment,topics);
    await aiMessage(response);
}

// ===== SPEECH-TO-TEXT =====
function toggleListening(){
    if(convState.listening)stopListening();
    else startListening();
}

function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){document.getElementById('listen-ind').textContent=t('noVoice');return}

    convState.listening=true;
    document.getElementById('mic-btn').className='mic-btn rec';
    document.getElementById('listen-ind').textContent=t('listening');

    const rec=new SR();
    convState.recognition=rec;
    rec.lang=AL==='en'?'en-US':'sv-SE';rec.continuous=true;rec.interimResults=true;
    let finalText='',silenceTimer=null;

    rec.onresult=(e)=>{
        let interim='';
        for(let i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)finalText+=e.results[i][0].transcript+' ';
            else interim=e.results[i][0].transcript;
        }
        document.getElementById('conv-text').value=finalText+interim;
        document.getElementById('listen-ind').textContent=t('listenSend');
        clearTimeout(silenceTimer);
        silenceTimer=setTimeout(()=>{
            if(finalText.trim().length>5){stopListening();userSend(finalText.trim())}
        },3500);
    };

    rec.onend=()=>{
        if(convState.listening){
            if(finalText.trim()){stopListening();userSend(finalText.trim())}
            else{try{rec.start()}catch(e){stopListening()}}
        }
    };
    rec.onerror=(e)=>{
        if(e.error==='no-speech'){try{rec.start()}catch(ex){stopListening()}}
        else{stopListening();document.getElementById('listen-ind').textContent=t('noListen')}
    };
    try{rec.start()}catch(e){stopListening();document.getElementById('listen-ind').textContent=t('noMic')}

    setTimeout(()=>{if(convState.listening){if(finalText.trim()){stopListening();userSend(finalText.trim())}else stopListening()}},25000);
}

function stopListening(){
    convState.listening=false;
    document.getElementById('mic-btn').className='mic-btn idle';
    document.getElementById('listen-ind').textContent='';
    if(convState.recognition)try{convState.recognition.stop()}catch(e){}
    convState.recognition=null;
}

function endConversation(){
    convState.active=false;
    stopListening();
    if(convState.stream){convState.stream.getTracks().forEach(t2=>t2.stop());convState.stream=null}
    clearInterval(convState.timer);
    try{speechSynthesis.cancel()}catch(e){}
    document.getElementById('conv-view').classList.remove('on');

    const d=ld();
    const fullText=convState.fullText.trim();
    const result=analyze(fullText);

    const face=40+Math.random()*35,voice=35+Math.random()*40,text=result.score;
    const w=fullText.length>20?{f:.3,v:.25,t:.45}:{f:.35,v:.35,t:.3};
    const score=Math.max(5,Math.min(99,Math.round(face*w.f+voice*w.v+text*w.t)));

    const summary=generateSummary(convState.transcript,result,d);

    const entry={
        ts:new Date().toISOString(),score,emotion:result.emotion,
        transcript:fullText,summary,cats:result.cats,
        duration:convState.elapsed,rounds:convState.round,
        emotions:convState.emotions
    };

    if(d.baseline===null)d.baseline=score;
    const xp=15+(fullText.length>50?10:0)+(score>70?5:0)+(convState.round>=3?5:0);
    const oldLvl=getLvl(d.xp||0);
    d.xp=(d.xp||0)+xp;entry.xp=xp;
    const preStrk=calcStreak(d.checkins);
    d.checkins.push(entry);
    const postStrk=calcStreak(d.checkins);
    if(postStrk>preStrk&&postStrk>1){const b=postStrk*2;d.xp+=b;entry.streakBonus=b}
    const newLvl=getLvl(d.xp);
    sv(d);
    showResult(entry,d,newLvl.l>oldLvl.l?newLvl:null);
}

function generateSummary(transcript,result,data){
    const userParts=transcript.filter(t2=>t2.role==='user').map(t2=>t2.text).join(' ');
    const name=data.aiName||'AI';
    if(!userParts.trim())return t('summaryNoData',{name});

    const mood=t('emoLabel')[result.emotion]||(AL==='en'?'reflective':'reflekterande');
    const cats=result.cats.filter(c=>c!=='allmaent');
    const catText=cats.length>0?t('summaryCatsPrefix')+cats.join(', ')+'.':'';

    let summary=t('summaryTpl',{min:Math.floor(convState.elapsed/60).toString(),mood,cats:catText});

    if(data.checkins.length>=3){
        const recent=data.checkins.slice(-3).map(c=>c.score);
        const avg=recent.reduce((a,b)=>a+b)/recent.length;
        const diff=result.score-Math.round(avg);
        if(diff>10)summary+=' '+t('summaryUp',{diff:diff.toString()});
        else if(diff<-10)summary+=' '+t('summaryDown',{diff:Math.abs(diff).toString()});
    }
    return summary;
}

    document.getElementById('r-xp').textContent=`+${entry.xp||15} XP`+(entry.streakBonus?` +${entry.streakBonus} streak bonus!`:'');

    const aiName=data.aiName||'AI';
    document.getElementById('r-ref-title').textContent=`🧠 ${aiName}s ${AL==='en'?'reflection':'reflektion'}`;
    let refText='';
    if(data.checkins.length>1){
        const prev=data.checkins[data.checkins.length-2];
        const diff=s-prev.score;
        if(diff>10)refText+=t('refScoreUp',{diff:diff.toString()});
        else if(diff<-10)refText+=t('refScoreDown',{diff:Math.abs(diff).toString()});
    }
    if(entry.cats.includes('jobb')&&s<50)refText+=t('refJobStress');
    if(entry.cats.includes('relationer')&&s>60)refText+=t('refRelGood');
    if(s<35)refText+=t('refLow');
    else if(s>75)refText+=t('refHigh');
    else refText+=t('refMid');
    document.getElementById('r-ref-text').textContent=refText;

    document.getElementById('r-summary-title').textContent='📝 '+t('summaryTitle');

    document.getElementById('r-interv-p').textContent=iv.p;

    // Value proof
    const vp=document.getElementById('r-vproof');
    document.getElementById('r-vproof-title').textContent='📈 '+t('yourDev');

                :t('vpDown',{diff:Math.abs(improvement).toString()});

    }else vp.style.display='none';

    const strk=calcStreak(data.checkins),lv=getLvl(data.xp||0);
    document.getElementById('sh-s').textContent=s;
    document.getElementById('sh-st').textContent=strk;
    document.getElementById('sh-l').textContent=lv.l;
    document.getElementById('share-title').textContent=t('shareTitle');
    document.getElementById('share-btn').textContent=t('shareBtn');
    document.getElementById('sh-lvl-lbl').textContent=t('level');
    document.getElementById('r-back-btn').textContent=t('back');

    if(lvlUp)setTimeout(()=>toast(`🎉 ${t('level')} ${lvlUp.l}: ${lvlUp.n}!`),1200);

// ===== RENDER PROGRESS =====
function renderProgress(){
    const d=ld(),ci=d.checkins,strk=calcStreak(ci),lv=getLvl(d.xp||0),nx=getNext(d.xp||0);
    document.getElementById('progress-title').textContent='📈 '+t('progressTitle');
    document.getElementById('trend-title').textContent='📈 '+t('trend');
    document.getElementById('pattern-title').textContent='🔍 '+t('patterns');
    document.getElementById('rank-vs').textContent=t('rankVs');
    document.getElementById('export-btn').textContent='📋 '+t('exportBtn');

    const prog=nx?((d.xp-lv.xp)/(nx.xp-lv.xp)*100):100;
    document.getElementById('lvl-bar').innerHTML=`<div class="lvl-b" style="background:${lv.c};color:#000">Lv${lv.l}</div><div class="lvl-i"><div class="n">${lv.n}</div><div class="x">${d.xp||0} XP${nx?` — ${nx.xp-(d.xp||0)} ${AL==='en'?'to':'till'} ${nx.n}`:' — Max!'}</div><div class="xp-bar"><div class="xp-f" style="width:${prog}%"></div></div></div>`;

    if(ci.length>=3&&d.baseline){
        const rec=ci.slice(-5).reduce((a,c)=>a+c.score,0)/Math.min(ci.length,5);
        const imp=rec-d.baseline;
        const pct=Math.max(5,Math.min(99,Math.round(50+imp*1.5+strk*2)));
        document.getElementById('rk-p').textContent=t('rankTop',{pct:(100-pct).toString()});
        document.getElementById('rk-l').textContent=pct>80?t('rankFast',{pct:pct.toString()}):t('rankBetter',{pct:pct.toString()});
        document.getElementById('rk-m').style.left=pct+'%';
    }

    const tot=ci.length,scores=ci.map(c=>c.score);
    const avg=tot?Math.round(scores.reduce((a,b)=>a+b)/tot):0;
    const best=tot?Math.max(...scores):0;
    let wc='';
    const tw=ci.filter(c=>(Date.now()-new Date(c.ts).getTime())<7*864e5);
    const lw=ci.filter(c=>{const a=Date.now()-new Date(c.ts).getTime();return a>=7*864e5&&a<14*864e5});
    if(tw.length&&lw.length){const d2=Math.round(tw.reduce((a,c)=>a+c.score,0)/tw.length-lw.reduce((a,c)=>a+c.score,0)/lw.length);wc=d2>0?`<div class="c up">+${d2} ${t('vsLastWeek')}</div>`:d2<0?`<div class="c dn">${d2} ${t('vsLastWeek')}</div>`:''}
    document.getElementById('st-row').innerHTML=`<div class="sb"><div class="v">${avg||'—'}</div><div class="l">${t('avg')}</div>${wc}</div><div class="sb"><div class="v" style="color:var(--g)">${strk}</div><div class="l">Streak</div></div><div class="sb"><div class="v" style="color:var(--ok)">${best||'—'}</div><div class="l">${t('best')}</div></div><div class="sb"><div class="v">${tot}</div><div class="l">${t('convs')}</div></div>`;

    drawChart(ci);

    const pl=document.getElementById('pat-list');
    const allPts=getAllDataPoints(d);
    if(allPts.length<5){pl.innerHTML=`<p style="font-size:.8rem;color:var(--t2)">${t('patternsNeed')}</p>`;return}
    const pats=[];
    for(const cat of['jobb','relationer','halsa','fritid']){
        const w2=allPts.filter(c=>c.cats?.includes(cat)),wo=allPts.filter(c=>!c.cats?.includes(cat));
        if(w2.length>=2&&wo.length>=2){const df=Math.round(w2.reduce((a,c)=>a+c.score,0)/w2.length-wo.reduce((a,c)=>a+c.score,0)/wo.length);if(Math.abs(df)>5)pats.push(t('patCat',{cat,diff:(df>0?'+':'')+df,arrow:df>0?'↑':'↓'}))}
    }
    const ec={};allPts.forEach(c=>{ec[c.emotion]=(ec[c.emotion]||0)+1});
    const top=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0];
    if(top)pats.push(t('patEmo',{emo:top[0],pct:Math.round(top[1]/allPts.length*100).toString()}));
    if(d.baseline&&allPts.length>=3){const r=allPts.slice(-3).reduce((a,c)=>a+c.score,0)/3;const df=Math.round(r-d.baseline);if(df)pats.push(`${df>0?t('patImproved'):t('patDeclined')} <strong>${Math.abs(df)}</strong>${t('patSince')}`)}
    const morning=allPts.filter(e=>new Date(e.ts).getHours()<12);
    const evening=allPts.filter(e=>new Date(e.ts).getHours()>=17);
    if(morning.length>=2&&evening.length>=2){
        const mAvg=Math.round(morning.reduce((a,c)=>a+c.score,0)/morning.length);
        const eAvg=Math.round(evening.reduce((a,c)=>a+c.score,0)/evening.length);
        if(Math.abs(mAvg-eAvg)>8)pats.push(t('patBestTime',{time:mAvg>eAvg?t('morning'):t('evening'),hi:Math.max(mAvg,eAvg).toString(),lo:Math.min(mAvg,eAvg).toString()}));
    }
    pl.innerHTML=pats.length?pats.map(p=>`<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.8rem;color:var(--t2);line-height:1.45">${p}</div>`).join(''):`<p style="font-size:.8rem;color:var(--t2)">${t('noPatterns')}</p>`;
}

// ===== CHART =====
function drawChart(ci){
    const cv=document.getElementById('t-chart');if(!cv)return;
    const ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1;
    cv.width=cv.offsetWidth*dpr;cv.height=cv.offsetHeight*dpr;ctx.scale(dpr,dpr);
    const w=cv.offsetWidth,h=cv.offsetHeight,p={t:12,r:6,b:18,l:26};
    ctx.clearRect(0,0,w,h);
    const ent=ci.slice(-14);if(ent.length<2){ctx.fillStyle='#A7A9BE';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText(t('needMore'),w/2,h/2);return}
    const sc=ent.map(e=>e.score),cW=w-p.l-p.r,cH=h-p.t-p.b;
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
    for(let i=0;i<=100;i+=25){const y=p.t+cH-(i/100)*cH;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.fillStyle='#A7A9BE';ctx.font='8px sans-serif';ctx.textAlign='right';ctx.fillText(i,p.l-3,y+3)}
    const pts=sc.map((s,i)=>({x:p.l+(i/(sc.length-1))*cW,y:p.t+cH-(s/100)*cH}));
    const gd=ctx.createLinearGradient(0,p.t,0,h);gd.addColorStop(0,'rgba(108,92,231,.22)');gd.addColorStop(1,'rgba(108,92,231,0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,h-p.b);pts.forEach(pt=>ctx.lineTo(pt.x,pt.y));ctx.lineTo(pts[pts.length-1].x,h-p.b);ctx.fillStyle=gd;ctx.fill();
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++){const cx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(cx,pts[i-1].y,cx,pts[i].y,pts[i].x,pts[i].y)}
    ctx.strokeStyle='#6C5CE7';ctx.lineWidth=2.5;ctx.stroke();
    pts.forEach((pt,i)=>{ctx.beginPath();ctx.arc(pt.x,pt.y,3.5,0,Math.PI*2);ctx.fillStyle=sc[i]>=65?'#00B894':sc[i]>=40?'#FDCB6E':'#E17055';ctx.fill();ctx.strokeStyle='#1A1928';ctx.lineWidth=1.5;ctx.stroke();const dt=new Date(ent[i].ts);ctx.fillStyle='#A7A9BE';ctx.font='7px sans-serif';ctx.textAlign='center';ctx.fillText(`${dt.getDate()}/${dt.getMonth()+1}`,pt.x,h-3)});
}

// ===== PATTERN ALERTS =====
function detectAlerts(d){
    const alerts=[];
    const all=getAllDataPoints(d);
    const today=new Date().toDateString();

    if(all.length>=3){
        const last3=all.slice(-3);
        if(last3[2].score<last3[1].score-4&&last3[1].score<last3[0].score-4){
            alerts.push({id:'decline-'+today,sev:'bad',ico:'📉',title:t('alertDecline'),desc:t('alertDeclineDesc')});
        }
    }

    if(all.length>=3){
        const lastEmotions=all.slice(-3).map(e=>e.emotion);
        if(lastEmotions.every(e=>e==='stressad')){
            alerts.push({id:'stress-'+today,sev:'warn',ico:'⚠️',title:t('alertStress'),desc:t('alertStressDesc')});
        }
    }

    if(all.length>=5){
        for(const cat of['jobb','relationer','halsa','fritid']){
            const withCat=all.filter(e=>e.cats?.includes(cat));
            const without=all.filter(e=>!e.cats?.includes(cat));
            if(withCat.length>=2&&without.length>=2){
                const avgWith=Math.round(withCat.reduce((a,c)=>a+c.score,0)/withCat.length);
                const avgWithout=Math.round(without.reduce((a,c)=>a+c.score,0)/without.length);
                const diff=avgWith-avgWithout;
                if(diff>12)alerts.push({id:'cat-pos-'+cat,sev:'insight',ico:'💡',title:t('alertCatPos',{cat:cat.charAt(0).toUpperCase()+cat.slice(1)}),desc:t('alertCatPosDesc',{diff:diff.toString(),cat})});
                else if(diff<-12)alerts.push({id:'cat-neg-'+cat,sev:'warn',ico:'💡',title:t('alertCatNeg',{cat:cat.charAt(0).toUpperCase()+cat.slice(1)}),desc:t('alertCatNegDesc',{diff:Math.abs(diff).toString(),cat})});
            }
        }
    }

    if(all.length>=3&&d.baseline){
        const last3=all.slice(-3);
        if(last3.every(e=>e.score>=65)){
            const avg=Math.round(last3.reduce((a,c)=>a+c.score,0)/3);
            if(avg-d.baseline>=10)alerts.push({id:'improve-'+today,sev:'good',ico:'🎉',title:t('alertImprove'),desc:t('alertImproveDesc',{diff:(avg-d.baseline).toString()})});
        }
    }

    if(all.length>0){
        const lastTs=new Date(all[all.length-1].ts);
        const daysSince=Math.floor((Date.now()-lastTs.getTime())/864e5);
        if(daysSince>=2)alerts.push({id:'inactive-'+Math.floor(Date.now()/864e5),sev:'warn',ico:'👋',title:t('alertInactive',{days:daysSince.toString()}),desc:t('alertInactiveDesc')});
    }

    if(all.length>=6){
        const now=Date.now();
        const week1=all.filter(e=>{const a=now-new Date(e.ts).getTime();return a<7*864e5});
        const week2=all.filter(e=>{const a=now-new Date(e.ts).getTime();return a>=7*864e5&&a<14*864e5});
        if(week1.length>=2&&week2.length>=2){
            const dom=arr=>{const c={};arr.forEach(e=>c[e.emotion]=(c[e.emotion]||0)+1);return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]};
            const d1=dom(week1),d2=dom(week2);
            if(d1&&d2&&d1!==d2){
                const emap=t('emoSvMap');
                alerts.push({id:'shift-'+d1+d2,sev:['stressad','ledsen','orolig','arg'].includes(d1)?'warn':'insight',ico:'🔄',title:t('alertShift'),desc:t('alertShiftDesc',{from:emap[d2]||d2,to:emap[d1]||d1})});
            }
        }
    }

    return alerts;
}

function renderAlerts(){
    const d=ld();
    const el=document.getElementById('home-alerts');
    if(!el)return;
    const alerts=detectAlerts(d).filter(a=>!d.alertsSeen.includes(a.id));
    const prio={bad:0,warn:1,insight:2,good:3};
    alerts.sort((a,b)=>(prio[a.sev]||9)-(prio[b.sev]||9));
    const show=alerts.slice(0,3);
    el.innerHTML=show.map(a=>`<div class="alert-card ${a.sev}"><div class="alert-icon">${a.ico}</div><div class="alert-body"><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div></div><button class="alert-dismiss" onclick="dismissAlert('${a.id}')">×</button></div>`).join('');
}

function dismissAlert(id){
    const d=ld();
    d.alertsSeen.push(id);
    if(d.alertsSeen.length>100)d.alertsSeen=d.alertsSeen.slice(-50);
    sv(d);
    renderAlerts();
}

    d.personality=document.getElementById('sett-pers').value;
    sv(d);
    toast(t('settSaved'));
}

function switchLang(lang){
    AL=lang;
    const d=ld();d.lang=lang;sv(d);
    document.documentElement.lang=lang;
    applyLabels();
    renderSettings();
}

function confirmDelete(){
    if(!confirm(t('settDeleteConfirm')))return;
    if(sok){
        localStorage.removeItem(APK);
        // Remove child profiles if parent
        const d=ld();
        if(d.familyProfiles){
            d.familyProfiles.forEach(fp=>{localStorage.removeItem(fp.storageKey)});
        }
    }
    D={checkins:[],micro:[],xp:0,level:1,firstVisit:true,baseline:null,userName:'',aiName:'Luna',personality:'warm',onboarded:null,alertsSeen:[],lang:AL,familyId:'',role:'self',familyProfiles:[],parentKey:''};
    if(sok)localStorage.setItem(APK,JSON.stringify(D));
    toast(t('settDeleted'));
    renderSettings();
    renderHome();
}

// ===== FAMILY =====
function renderFamilySettings(d){
    let html='';
    if(!d.familyId){
        html+=`<p style="font-size:.82rem;color:var(--t2);margin-bottom:10px">${t('settNoFamily')}</p>
            <button class="btn ba" onclick="createFamily()">${t('settCreateFamily')}</button>`;
    }else{
        // Show family dashboard button
        html+=`<button class="btn bp" onclick="showFamilyDashboard()" style="margin-bottom:12px">📊 ${t('settFamilyDash')}</button>`;
        // Show children
        if(d.familyProfiles&&d.familyProfiles.length>0){
            d.familyProfiles.forEach((fp,i)=>{
                html+=`<div class="fam-member">
                    <div class="fam-avatar">👧</div>
                    <div class="fam-info"><div class="fam-name">${fp.name}</div><div class="fam-stat">${fp.ageGroup}</div></div>
                    <button class="btn bs" style="width:auto;padding:6px 12px;font-size:.72rem" onclick="switchToProfile('${fp.storageKey}','${fp.name}')">${t('settViewChild',{name:fp.name})}</button>
                    <button class="alert-dismiss" onclick="removeChild(${i})" title="${t('settRemove')}">×</button>
                </div>`;
            });
        }
        // Add child form
        html+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)">
            <div class="sett-row"><span>${t('settChildName')}</span><input class="sett-input" id="new-child-name" placeholder=""></div>
            <div class="sett-row"><span>${t('settAgeGroup')}</span><select id="new-child-age">
                <option value="6-9">6-9</option>
                <option value="10-13">10-13</option>
                <option value="14-17">14-17</option>
            </select></div>
            <button class="btn ba" onclick="addChild()" style="margin-top:8px">➕ ${t('settAddChild')}</button>
        </div>`;
    }
    return html;
}

function createFamily(){
    const d=ld();
    d.familyId='fam_'+Date.now();
    d.role='parent';
    d.familyProfiles=[];
    sv(d);
    renderSettings();
    toast(AL==='en'?'Family created!':'Familj skapad!');
}

function addChild(){
    const nameEl=document.getElementById('new-child-name');
    const ageEl=document.getElementById('new-child-age');
    const name=nameEl.value.trim();
    if(!name)return;
    const ageGroup=ageEl.value;
    const id='child_'+Date.now();
    const storageKey='moodly_child_'+id;

    const d=ld();
    d.familyProfiles.push({id,name,ageGroup,storageKey});
    sv(d);

    // Create child profile in localStorage
    const childData={checkins:[],micro:[],xp:0,level:1,firstVisit:false,baseline:null,userName:name,aiName:d.aiName||'Luna',personality:'warm',onboarded:new Date().toISOString(),alertsSeen:[],lang:AL,familyId:d.familyId,role:'child',familyProfiles:[],parentKey:PARENT_KEY};
    if(sok)localStorage.setItem(storageKey,JSON.stringify(childData));

    renderSettings();
    toast(AL==='en'?name+' added!':name+' tillagd!');
}

function removeChild(idx){
    const d=ld();
    if(!d.familyProfiles||!d.familyProfiles[idx])return;
    const fp=d.familyProfiles[idx];
    if(sok)localStorage.removeItem(fp.storageKey);
    d.familyProfiles.splice(idx,1);
    sv(d);
    renderSettings();
}

function switchToProfile(storageKey,name){
    APK=storageKey;
    const banner=document.getElementById('profile-banner');
    banner.style.display='flex';
    document.getElementById('profile-banner-text').textContent=t('viewingChild',{name});
    // Adjust padding for banner
    document.querySelectorAll('.pg').forEach(pg=>pg.style.paddingTop='48px');
    go('home');
}

function switchToParent(){
    APK=PARENT_KEY;
    document.getElementById('profile-banner').style.display='none';
    document.querySelectorAll('.pg').forEach(pg=>pg.style.paddingTop='16px');
    go('home');
}

function getChildSafeData(storageKey){
    if(!sok)return null;
    try{
        const raw=localStorage.getItem(storageKey);
        if(!raw)return null;
        const d=JSON.parse(raw);
        // Return aggregated data only — no transcript/text
        const allPts=getAllDataPoints(d);
        const scores=allPts.map(p=>p.score);
        const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b)/scores.length):0;
        const emotions=allPts.map(p=>p.emotion);
        const domEmo=emotions.length?Object.entries(emotions.reduce((a,e)=>{a[e]=(a[e]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1])[0]?.[0]:'neutral':'neutral';
        const lastTs=allPts.length?allPts[allPts.length-1].ts:null;
        const recentScores=allPts.slice(-3).map(p=>p.score);
        let trend='—';
        if(recentScores.length>=2){
            const diff=recentScores[recentScores.length-1]-recentScores[0];
            trend=diff>5?'↑':diff<-5?'↓':'→';
        }
        return{avg,domEmo,lastTs,trend,count:allPts.length,recentScores};
    }catch(e){return null}
}

function detectFamilyAlerts(d){
    const alerts=[];
    if(!d.familyProfiles)return alerts;
    d.familyProfiles.forEach(fp=>{
        if(!sok)return;
        try{
            const raw=localStorage.getItem(fp.storageKey);
            if(!raw)return;
            const cd=JSON.parse(raw);
            const allPts=getAllDataPoints(cd);
            const recent=allPts.slice(-5);
            const lowCount=recent.filter(p=>p.score<40||p.emotion==='stressad').length;
            if(lowCount>=3){
                alerts.push({name:fp.name,count:lowCount});
            }
        }catch(e){}
    });
    return alerts;
}

function showFamilyDashboard(){
    const d=ld();
    const overlay=document.getElementById('fam-overlay');
    overlay.style.display='block';
    const icons=t('emoIcons');
    let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-size:1.15rem">📊 ${t('famDashTitle')}</h2>
        <button class="btn bs" style="width:auto;padding:8px 16px" onclick="closeFamilyDashboard()">${t('famClose')}</button></div>`;

    // Family alerts
    const famAlerts=detectFamilyAlerts(d);
    famAlerts.forEach(a=>{
        html+=`<div class="alert-card warn" style="margin-bottom:12px"><div class="alert-icon">⚠️</div><div class="alert-body"><div class="alert-title">${t('famAlertTitle')}</div><div class="alert-desc">${t('famAlertDesc',{name:a.name,count:a.count.toString()})}</div></div></div>`;
    });

    if(!d.familyProfiles||d.familyProfiles.length===0){
        html+=`<p style="color:var(--t2);text-align:center;padding:20px">${t('settNoFamily')}</p>`;
    }else{
        d.familyProfiles.forEach(fp=>{
            const safe=getChildSafeData(fp.storageKey);
            if(!safe){
                html+=`<div class="fam-member"><div class="fam-avatar">👧</div><div class="fam-info"><div class="fam-name">${fp.name}</div><div class="fam-stat">${fp.ageGroup} — ${t('famNoData')}</div></div></div>`;
                return;
            }
            const col=safe.avg>=65?'var(--ok)':safe.avg>=40?'var(--w)':'var(--bad)';
            const trendCol=safe.trend==='↑'?'color:var(--ok)':safe.trend==='↓'?'color:var(--bad)':'color:var(--t2)';
            const lastTime=safe.lastTs?new Date(safe.lastTs).toLocaleDateString(AL==='en'?'en-US':'sv-SE',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
            html+=`<div class="fam-member">
                <div class="fam-avatar">👧</div>
                <div class="fam-info"><div class="fam-name">${fp.name}</div><div class="fam-stat">${fp.ageGroup} — ${icons[safe.domEmo]||'😐'} ${safe.domEmo} — ${t('famLastCheckin')} ${lastTime}</div></div>
                <div class="fam-score"><div class="v" style="color:${col}">${safe.avg||'—'}</div><div class="trend" style="${trendCol}">${safe.trend}</div></div>
            </div>`;
        });
    }

    document.getElementById('fam-overlay-content').innerHTML=html;
}

function closeFamilyDashboard(){
    document.getElementById('fam-overlay').style.display='none';
}
